<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc"><title id="title">German Teaching Platform workflow map</title><desc id="desc">A teaching operations platform connects students, curriculum, AI-assisted lesson drafts, teacher review, delivery and progress tracking.</desc><defs><pattern id="g" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#1e293b"/></pattern><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#60a5fa"/></marker></defs><rect width="1200" height="520" rx="24" fill="#020617"/><rect width="1200" height="520" rx="24" fill="url(#g)"/><text x="56" y="64" fill="#f8fafc" font-family="Arial" font-size="28" font-weight="700">German Teaching Platform · operating workflow</text><text x="56" y="94" fill="#94a3b8" font-family="Arial" font-size="15">Curriculum structure, AI assistance, teacher control, delivery and progress</text><g fill="none" stroke="#60a5fa" stroke-width="3" marker-end="url(#a)"><path d="M220 250H296"/><path d="M476 250H552"/><path d="M732 250H808"/><path d="M988 250H1064"/><path d="M642 310V380H900"/></g><g font-family="Arial"><g fill="#0f172a" stroke-width="2"><rect x="40" y="185" width="180" height="130" rx="14" stroke="#22d3ee"/><rect x="296" y="185" width="180" height="130" rx="14" stroke="#34d399"/><rect x="552" y="185" width="180" height="130" rx="14" stroke="#fbbf24"/><rect x="808" y="185" width="180" height="130" rx="14" stroke="#a78bfa"/><rect x="1008" y="185" width="152" height="130" rx="14" stroke="#fb7185"/><rect x="780" y="380" width="240" height="80" rx="14" stroke="#94a3b8"/></g><g font-size="18" font-weight="700" text-anchor="middle"><text x="130" y="225" fill="#67e8f9">STUDENT</text><text x="386" y="225" fill="#6ee7b7">CURRICULUM</text><text x="642" y="225" fill="#fcd34d">AI DRAFT</text><text x="898" y="225" fill="#c4b5fd">TEACHER REVIEW</text><text x="1084" y="225" fill="#fda4af">DELIVERY</text><text x="900" y="412" fill="#cbd5e1">PROGRESS + EXPORT</text></g><g fill="#cbd5e1" font-size="14" text-anchor="middle"><text x="130" y="254">profile · level</text><text x="130" y="278">learning goals</text><text x="386" y="254">CEFR roadmap</text><text x="386" y="278">topics · materials</text><text x="642" y="254">lesson plan</text><text x="642" y="278">exercises · script</text><text x="898" y="254">validate · edit</text><text x="898" y="278">approve content</text><text x="1084" y="254">session</text><text x="1084" y="278">lesson assets</text><text x="900" y="438">tracking · Google Docs · next lesson</text></g></g><text x="600" y="495" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="14">AI proposes; the teaching workflow remains structured and reviewable.</text></svg>
