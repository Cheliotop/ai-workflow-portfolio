<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
<title id="title">ContaBot Mini review workflow</title><desc id="desc">Fake XML moves through deterministic parsing and validation to human review and a bounded audit export.</desc>
<defs><pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#1e293b" stroke-width="1"/></pattern><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#60a5fa"/></marker></defs>
<rect width="1200" height="420" rx="24" fill="#020617"/><rect width="1200" height="420" rx="24" fill="url(#grid)"/>
<text x="56" y="64" fill="#f8fafc" font-family="Arial,sans-serif" font-size="28" font-weight="700">ContaBot Mini · auditable review flow</text><text x="56" y="94" fill="#94a3b8" font-family="Arial,sans-serif" font-size="15">Fake data · deterministic core · human decision · bounded export</text>
<g fill="none" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrow)"><path d="M226 216H286"/><path d="M466 216H526"/><path d="M706 216H766"/><path d="M946 216H1006"/></g>
<g font-family="Arial,sans-serif"><g><rect x="46" y="154" width="180" height="124" rx="14" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/><text x="136" y="192" text-anchor="middle" fill="#67e8f9" font-size="18" font-weight="700">FAKE XML</text><text x="136" y="222" text-anchor="middle" fill="#cbd5e1" font-size="14">invoice fields</text><text x="136" y="246" text-anchor="middle" fill="#cbd5e1" font-size="14">source checksum</text></g>
<g><rect x="286" y="154" width="180" height="124" rx="14" fill="#0f172a" stroke="#34d399" stroke-width="2"/><text x="376" y="192" text-anchor="middle" fill="#6ee7b7" font-size="18" font-weight="700">PARSE</text><text x="376" y="222" text-anchor="middle" fill="#cbd5e1" font-size="14">bounded fields</text><text x="376" y="246" text-anchor="middle" fill="#cbd5e1" font-size="14">source pointers</text></g>
<g><rect x="526" y="154" width="180" height="124" rx="14" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/><text x="616" y="192" text-anchor="middle" fill="#fcd34d" font-size="18" font-weight="700">VALIDATE</text><text x="616" y="222" text-anchor="middle" fill="#cbd5e1" font-size="14">explicit reason codes</text><text x="616" y="246" text-anchor="middle" fill="#cbd5e1" font-size="14">never guess</text></g>
<g><rect x="766" y="154" width="180" height="124" rx="14" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/><text x="856" y="192" text-anchor="middle" fill="#c4b5fd" font-size="18" font-weight="700">REVIEW</text><text x="856" y="222" text-anchor="middle" fill="#cbd5e1" font-size="14">append decision</text><text x="856" y="246" text-anchor="middle" fill="#cbd5e1" font-size="14">preserve base status</text></g>
<g><rect x="1006" y="154" width="148" height="124" rx="14" fill="#0f172a" stroke="#fb7185" stroke-width="2"/><text x="1080" y="192" text-anchor="middle" fill="#fda4af" font-size="18" font-weight="700">EXPORT</text><text x="1080" y="222" text-anchor="middle" fill="#cbd5e1" font-size="14">audit summary</text><text x="1080" y="246" text-anchor="middle" fill="#cbd5e1" font-size="14">no raw XML</text></g></g>
<text x="600" y="350" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="14">Core invariant: processing status, review state, and workflow state remain separate.</text></svg>
