<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc"><title id="title">PHC release and handoff flow</title><desc id="desc">A sanitized map of mobile app, backend, QA, Android packaging and operator handoff.</desc><defs><pattern id="g" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#1e293b"/></pattern><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#60a5fa"/></marker></defs><rect width="1200" height="500" rx="24" fill="#020617"/><rect width="1200" height="500" rx="24" fill="url(#g)"/><text x="56" y="64" fill="#f8fafc" font-family="Arial" font-size="28" font-weight="700">PHC · mobile/backend release handoff</text><text x="56" y="94" fill="#94a3b8" font-family="Arial" font-size="15">Sanitized delivery map — no client data, endpoints or deployment secrets</text><g fill="none" stroke="#60a5fa" stroke-width="3" marker-end="url(#a)"><path d="M262 232H348"/><path d="M542 232H628"/><path d="M822 232H908"/><path d="M725 292V370H1010"/></g><g font-family="Arial"><g fill="#0f172a" stroke-width="2"><rect x="54" y="165" width="208" height="134" rx="14" stroke="#22d3ee"/><rect x="348" y="165" width="194" height="134" rx="14" stroke="#34d399"/><rect x="628" y="165" width="194" height="134" rx="14" stroke="#fbbf24"/><rect x="908" y="165" width="238" height="134" rx="14" stroke="#a78bfa"/><rect x="870" y="370" width="280" height="76" rx="14" stroke="#fb7185"/></g><g font-size="18" font-weight="700" text-anchor="middle"><text x="158" y="207" fill="#67e8f9">MOBILE APP</text><text x="445" y="207" fill="#6ee7b7">BACKEND</text><text x="725" y="207" fill="#fcd34d">QA GATE</text><text x="1027" y="207" fill="#c4b5fd">ANDROID RELEASE</text><text x="1010" y="402" fill="#fda4af">OPERATOR HANDOFF</text></g><g fill="#cbd5e1" font-size="14" text-anchor="middle"><text x="158" y="240">field workflow</text><text x="158" y="264">React Native / Expo</text><text x="445" y="240">API · persistence</text><text x="445" y="264">reachability planning</text><text x="725" y="240">real-device checklist</text><text x="725" y="264">tunnel / smoke checks</text><text x="1027" y="240">APK artifacts</text><text x="1027" y="264">release constraints</text><text x="1010" y="429">install steps · runbook · support boundaries</text></g></g><text x="600" y="478" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="14">Claim boundary: release and handoff proof, not an unverified production-deployment claim.</text></svg>
