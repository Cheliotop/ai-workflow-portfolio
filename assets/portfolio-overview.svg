<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc"><title id="title">Sergio Hoeckh proof of work map</title><desc id="desc">Three projects demonstrate deterministic workflow QA, AI-assisted product operations and mobile release handoff.</desc><defs><pattern id="g" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#1e293b"/></pattern></defs><rect width="1200" height="430" rx="24" fill="#020617"/><rect width="1200" height="430" rx="24" fill="url(#g)"/><text x="56" y="64" fill="#f8fafc" font-family="Arial" font-size="28" font-weight="700">Proof of work · AI workflow operations</text><text x="56" y="94" fill="#94a3b8" font-family="Arial" font-size="15">From unclear process to structured workflow, verification and usable handoff</text><g font-family="Arial"><g fill="#0f172a" stroke-width="2"><rect x="52" y="150" width="330" height="200" rx="18" stroke="#22d3ee"/><rect x="435" y="150" width="330" height="200" rx="18" stroke="#34d399"/><rect x="818" y="150" width="330" height="200" rx="18" stroke="#a78bfa"/></g><g font-size="21" font-weight="700"><text x="82" y="195" fill="#67e8f9">ContaBot</text><text x="465" y="195" fill="#6ee7b7">German Teaching Platform</text><text x="848" y="195" fill="#c4b5fd">PHC Monitoring System</text></g><g fill="#cbd5e1" font-size="15"><text x="82" y="232">• XML review workflow</text><text x="82" y="262">• Explicit states and audit trail</text><text x="82" y="292">• 1,059 verified tests</text><text x="82" y="322">• Runnable public mini-demo</text><text x="465" y="232">• Curriculum and student operations</text><text x="465" y="262">• AI-assisted lesson workflow</text><text x="465" y="292">• 53-page production build</text><text x="465" y="322">• 212 passing tests; 11 known gaps</text><text x="848" y="232">• Mobile + backend coordination</text><text x="848" y="262">• Android release artifacts</text><text x="848" y="292">• QA and deployment planning</text><text x="848" y="322">• Operator handoff documentation</text></g></g><text x="600" y="398" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="14">Positioning: practical workflow direction, AI-assisted implementation, documentation, QA and verification.</text></svg>
